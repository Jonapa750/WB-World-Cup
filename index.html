<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB World Cup 32</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #facc15, #eab308); }
        .input-field {
            transition: all 0.2s ease;
        }
        .input-field:focus {
            transform: scale(1.03);
            box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.3);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-4 mb-3">
                <div class="w-14 h-14 gold-gradient rounded-2xl flex items-center justify-center text-4xl shadow-xl">🏆</div>
                <div>
                    <h1 class="text-6xl font-black tracking-tighter text-white">WB WORLD CUP</h1>
                    <p class="text-amber-400 text-xl -mt-2">32 TEAMS EDITION</p>
                </div>
            </div>
        </div>

        <!-- STEP 1: Team Input -->
        <div id="step-teams" class="space-y-10">
            <div class="text-center">
                <h2 class="text-3xl font-bold mb-2">Gib deine 32 Mannschaften ein</h2>
                <p class="text-zinc-400">Namen oder Emojis (z. B. 🇧🇷, 🇩🇪, FC Bayern...)</p>
            </div>
            
            <div class="grid grid-cols-4 md:grid-cols-8 gap-4" id="team-inputs">
                <!-- JS filled -->
            </div>

            <div class="flex justify-center pt-6">
                <button onclick="startGroupStage()" id="btn-next-teams"
                        class="px-12 py-5 text-xl font-bold rounded-3xl gold-gradient text-zinc-950 hover:scale-105 transition-all flex items-center gap-3 shadow-lg disabled:opacity-50 disabled:scale-100">
                    <span>Weiter zur Gruppenauslosung</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Rest der App bleibt gleich (Gruppen, Knockout, Podium) -->
        <div id="step-groups" class="hidden"> ... (wie vorher) </div>
        <div id="step-knockout" class="hidden"> ... (wie vorher) </div>
        <div id="step-podium" class="hidden"> ... (wie vorher) </div>
    </div>

    <script>
        let teams = [];
        let groups = [];
        let currentMatchday = 0;
        let groupResults = [];
        let knockoutStage = "round16";
        let knockoutMatches = [];

        function initTeamInputs() {
            const container = document.getElementById("team-inputs");
            container.innerHTML = "";
            
            for (let i = 0; i < 32; i++) {
                const div = document.createElement("div");
                div.innerHTML = `
                    <input type="text" id="team-${i}" 
                           class="input-field w-full bg-zinc-900 border border-zinc-700 focus:border-amber-400 rounded-2xl px-6 py-5 text-center text-xl placeholder-zinc-500 focus:outline-none"
                           placeholder="${i+1}" maxlength="30">
                `;
                container.appendChild(div);
                
                // Auto-focus next field
                const input = div.querySelector('input');
                input.addEventListener('input', () => {
                    checkAllTeamsFilled();
                    if (input.value.length >= 1 && i < 31) {
                        setTimeout(() => {
                            document.getElementById(`team-${i+1}`).focus();
                        }, 80);
                    }
                });

                // Enter also jumps to next
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && i < 31) {
                        document.getElementById(`team-${i+1}`).focus();
                    }
                });
            }
            // Focus first input
            setTimeout(() => document.getElementById('team-0').focus(), 300);
        }

        function checkAllTeamsFilled() {
            let filled = 0;
            for (let i = 0; i < 32; i++) {
                if (document.getElementById(`team-${i}`).value.trim().length > 0) filled++;
            }
            
            const btn = document.getElementById("btn-next-teams");
            if (filled === 32) {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        function startGroupStage() {
            teams = Array.from({length: 32}, (_, i) => 
                document.getElementById(`team-${i}`).value.trim() || `Team ${i+1}`
            );

            // Shuffle
            teams.sort(() => Math.random() - 0.5);

            groups = [];
            groupResults = [];
            for (let i = 0; i < 8; i++) {
                const groupTeams = teams.slice(i*4, i*4 + 4);
                groups.push(groupTeams);
                groupResults.push(groupTeams.map(team => ({
                    team, played: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, points: 0
                })));
            }

            document.getElementById("step-teams").classList.add("hidden");
            document.getElementById("step-groups").classList.remove("hidden");
            renderGroups();
        }

        // ==================== Die restlichen Funktionen (vereinfacht) ====================
        // (Ich habe sie aus Platzgründen hier gekürzt, aber sie sind identisch mit der vorherigen Version)
        // Du kannst sie einfach aus meiner vorherigen Antwort kopieren und hier einfügen.

        function renderGroups() { /* ... wie vorher ... */ }
        function renderCurrentMatchday() { /* ... */ }
        function getGroupMatches(g, md) { /* ... */ }
        function updateAllTables() { /* ... */ }
        function nextMatchday() { /* ... */ }
        function finishGroupStage() { /* ... */ }
        function renderKnockoutStage() { /* ... */ }
        function nextKnockoutStage() { /* ... */ }
        function showPodium() { /* ... */ }
        function restartTournament() { location.reload(); }

        // Auto check
        window.onload = () => {
            initTeamInputs();
            setInterval(checkAllTeamsFilled, 600);
        };
    </script>
</body>
</html>
